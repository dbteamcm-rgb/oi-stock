  <script>
/* ŌĢÉŌĢÉ OPERACION INFANCIA overlay ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ
   host mode  ŌåÆ add/edit/delete GLOBAL (all zones)
   volunteer  ŌåÆ add/delete for CURRENT ZONE only
   ŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉŌĢÉ */
var OI_SEC_MAP = {
  "LAPICES Y PLUMONES":   "A cargo de Programas",
  "TEMPERAS":             "A cargo de Programas",
  "MATERIALES GENERALES": "A cargo de Coordinaci├│n"
};
var OI_SEC_COLORS = {
  "A cargo de Programas":   "#7E135D",
  "A cargo de Coordinaci├│n":"#1748A8"
};
window.OI_CUSTOM_SECS = {};
window.OI_MODE = localStorage.getItem('oi_mode') || 'volunteer';

/* ŌöĆŌöĆ Section headers Mi Caja ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
function injectSections(){
  var pinks = document.querySelectorAll('.bg-pink-50');
  var last = null;
  pinks.forEach(function(el){
    var txt = (el.textContent||'').trim().toUpperCase();
    var sec = OI_SEC_MAP[txt] || window.OI_CUSTOM_SECS[txt] || null;
    if(!sec) return;
    var parent = el.parentElement;
    if(!parent || !parent.parentElement) return;
    var prev = parent.previousElementSibling;
    if(prev && prev.getAttribute('data-oi-sec')===sec){ last=sec; return; }
    if(sec !== last){
      var hdr=document.createElement('div');
      hdr.setAttribute('data-oi-sec',sec);
      var col=OI_SEC_COLORS[sec]||'#6b7280';
      hdr.style.cssText='padding:8px 16px 7px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:white;background:'+col+';border-radius:12px 12px 0 0;margin-top:10px;display:flex;align-items:center;gap:6px;';
      hdr.innerHTML=(sec==="A cargo de Programas"?'­¤Ä© ':'­¤ōŗ ')+sec;
      parent.parentElement.insertBefore(hdr, parent);
    }
    last = sec;
  });
}

/* ŌöĆŌöĆ Section headers Reposici├│n ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
function injectReposicionSections(){
  if(!window.__oi_state) return;
  var matMap={};
  window.__oi_state.matDefs.forEach(function(m){matMap[m.name]=m.cat;});
  var rows=document.querySelectorAll('[class*="grid"][class*="items-center"]');
  var lastSec=null;
  rows.forEach(function(row){
    if(row.querySelector('.oi-edit-btn')) return;
    var nameEl=row.querySelector('span.text-sm,span.font-medium');
    if(!nameEl) return;
    var name=(nameEl.textContent||'').trim();
    var cat=matMap[name];
    if(!cat) return;
    var sec=OI_SEC_MAP[cat.toUpperCase()]||window.OI_CUSTOM_SECS[cat.toUpperCase()]||null;
    if(!sec) return;
    if(sec===lastSec) return;
    var prev=row.previousElementSibling;
    if(prev && prev.getAttribute('data-oi-rep-sec')===sec){lastSec=sec;return;}
    var hdr=document.createElement('div');
    hdr.setAttribute('data-oi-rep-sec',sec);
    var col=OI_SEC_COLORS[sec]||'#6b7280';
    hdr.style.cssText='padding:7px 16px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:white;background:'+col+';border-radius:8px;margin:10px 0 4px 0;display:flex;align-items:center;gap:5px;';
    hdr.innerHTML=(sec==="A cargo de Programas"?'­¤Ä© ':'­¤ōŗ ')+sec;
    row.parentElement.insertBefore(hdr,row);
    lastSec=sec;
  });
}
setInterval(function(){injectSections();injectReposicionSections();},700);

/* ŌöĆŌöĆ Edit buttons (host only) ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
function injectEditBtns(){
  if(!window.__oi_state||window.OI_MODE!=='host') return;
  var matMap={};
  window.__oi_state.matDefs.forEach(function(m){matMap[m.name]=m;});
  document.querySelectorAll('[class*="grid"][class*="items-center"]:not([data-oi-edited])').forEach(function(row){
    if(row.querySelector('.oi-edit-btn')) return;
    var nameEl=row.querySelector('span.text-sm,span.font-medium');
    if(!nameEl) return;
    var name=(nameEl.textContent||'').trim();
    var mat=matMap[name];
    if(!mat) return;
    row.setAttribute('data-oi-edited','1');
    var btn=document.createElement('button');
    btn.className='oi-edit-btn';
    btn.style.cssText='display:flex;align-items:center;justify-content:center;background:#f3f4f6;border:none;border-radius:6px;padding:3px 6px;cursor:pointer;font-size:13px;flex-shrink:0;';
    btn.textContent='Ō£Å’ĖÅ';
    btn.onclick=function(e){e.stopPropagation();openEdit(mat.id);};
    row.appendChild(btn);
  });
}
setInterval(injectEditBtns, 1200);

/* ŌöĆŌöĆ Mode ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
function applyMode(){
  var fab=document.getElementById('oi-fab');
  var modeBtn=document.getElementById('oi-mode-btn');
  var isHost=window.OI_MODE==='host';
  if(fab) fab.style.display='flex';   // always visible
  if(modeBtn){
    modeBtn.textContent=isHost?'­¤ææ Jefe':'­¤æż Voluntario';
    modeBtn.style.background=isHost?'#7E135D':'#1748A8';
  }
}

/* ŌöĆŌöĆ Edit material modal ŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆŌöĆ */
function openEdit(matId){
  if(!window.__oi_state) return;
  var mat=window.__oi_state.matDefs.find(function(m){return m.id===matId;});
  if(!mat) return;
  document.getElementById('oi-edit-id').value=matId;
  document.getElementById('oi-edit-name').value=mat.name;
  document.getElementById('oi-edit-meta').value=mat.meta;
  var cats=[...new Set(window.__oi_state.matDefs.map(function(m){return m.cat;}))];
  var sel=document.getElementById('oi-edit-cat');
  sel.innerHTML=cats.map(function(c){return'<option value="'+c+'"'+(c===mat.cat?' selected':'')+'>'+c+'</option>';}).join('');
  document.getElementById('oi-edit-ov').style.display='flex';
  document.getElementById('oi-edit-name').focus();
}

    +'<div id="panel-del" style="display:none;overflow-y:auto;padding:12px 20px 20px;">'

    '<div style="background:white;border-radius:16px;padding:24px;width:100%;max-width:400px;">'
    +'<h3 style="font-weight:700;font-size:16px;margin:0 0 4px 0;">Ō£Å’ĖÅ Editar material</h3>'

    +'<label style="font-size:11px;font-weight:600;text-transform:uppercase;color:#555;display:block;margin-bottom:5px;">Meta</label>'
    +'<input id="oi-edit-meta" type="number" min="0" style="width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:10px;font-size:14px;outline:none;box-sizing:border-box;text-align:center;margin-bottom:20px;">'

  window._selSec = "A cargo de Programas";

    });
    updateCatOptions();
  };

  window.toggleNewCat = function(){

    var vis = row.style.display!=='none';
    row.style.display = vis?'none':'block';
    if(!vis) setTimeout(function(){document.getElementById('oi-newcat').focus();},50);
  };

  function updateCatOptions(){
    if(!window.__oi_state) return;
    var allCats = [...new Set(window.__oi_state.matDefs.map(function(m){return m.cat;}))];
    document.getElementById('oi-ct').innerHTML = allCats.map(function(c){return'<option value="'+c+'">'+c+'</option>';}).join('');
  }

  window.switchTab = function(tab){
    document.getElementById('panel-add').style.display = tab==='add'?'block':'none';
    document.getElementById('panel-del').style.display = tab==='del'?'block':'none';
    document.getElementById('tab-add').style.color = tab==='add'?'#7E135D':'#9ca3af';
    document.getElementById('tab-add').style.borderBottom = tab==='add'?'2px solid #7E135D':'2px solid transparent';
    document.getElementById('tab-del').style.color = tab==='del'?'#7E135D':'#9ca3af';
    document.getElementById('tab-del').style.borderBottom = tab==='del'?'2px solid #7E135D':'2px solid transparent';
    if(tab==='del') renderDelList();
  };

  window.renderDelList = function(){
    if(!window.__oi_state) return;
    var isHost = window.OI_MODE==='host';
    var curZone = window.__oi_state.zone;
    var q = (document.getElementById('oi-search').value||'').toLowerCase();

    // Host sees global materials; volunteer sees only their zone's materials
    var mats = window.__oi_state.matDefs.filter(function(m){
      var nameMatch = m.name.toLowerCase().indexOf(q)>=0;
      if(!nameMatch) return false;
      if(isHost) return !m.zone; // jefe only sees/deletes global
      return m.zone === curZone;  // volunteer only sees/deletes their zone
    });

    var scopeEl = document.getElementById('oi-del-scope');
    if(isHost){
      scopeEl.innerHTML='­¤īÉ Materiales globales (todas las zonas)';
      scopeEl.style.cssText='font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;margin-bottom:12px;display:inline-block;background:#7E135D22;color:#7E135D;';
    } else {
      scopeEl.innerHTML='­¤ōŹ Solo materiales de: <strong>'+(curZone||'tu zona')+'</strong>';
      scopeEl.style.cssText='font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;margin-bottom:12px;display:block;background:#1748A822;color:#1748A8;';
    }

    var list = document.getElementById('oi-del-list');
    if(mats.length===0){
      list.innerHTML='<div style="text-align:center;color:#9ca3af;padding:20px;font-size:13px;">'+(isHost?'No hay materiales globales a├║n':'No has a├▒adido materiales en esta zona a├║n')+'</div>';
      return;
    }
    list.innerHTML = mats.map(function(m){
      var sec = OI_SEC_MAP[(m.cat||'').toUpperCase()]||window.OI_CUSTOM_SECS[(m.cat||'').toUpperCase()]||'ŌĆö';
      var col = OI_SEC_COLORS[sec]||'#6b7280';
      return'<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:10px;gap:8px;">'
        +'<div><div style="font-size:14px;font-weight:600;color:#111;">'+m.name+'</div>'
        +'<div style="font-size:11px;margin-top:2px;"><span style="background:'+col+'22;color:'+col+';padding:2px 6px;border-radius:4px;font-weight:600;">'+sec+'</span> <span style="color:#888;">'+m.cat+'</span></div></div>'
        +'<button onclick="deleteMat(\''+m.id+'\')" style="background:#fee2e2;color:#dc2626;border:none;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;">Eliminar</button>'
        +'</div>';
    }).join('');
  };

  window.deleteMat = function(id){
    if(!confirm('┬┐Eliminar este material?')) return;
    var ns = Object.assign({},window.__oi_state,{
      matDefs: window.__oi_state.matDefs.filter(function(m){return m.id!==id;})
    });
    window.__oi_setState(ns);
    renderDelList();
  };

  function openForm(){
    if(!window.__oi_state) return;
    var isHost = window.OI_MODE==='host';
    var curZone = window.__oi_state.zone||'tu zona';
    var badge = document.getElementById('oi-scope-badge');
    if(isHost){
      badge.innerHTML='­¤īÉ Se a├▒adir├Ī a <strong>todas las zonas</strong>';
      badge.style.cssText='font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;margin-bottom:14px;display:inline-block;background:#7E135D22;color:#7E135D;';
    } else {
      badge.innerHTML='­¤ōŹ Se a├▒adir├Ī solo a <strong>'+curZone+'</strong>';
      badge.style.cssText='font-size:12px;font-weight:700;padding:6px 12px;border-radius:8px;margin-bottom:14px;display:inline-block;background:#1748A822;color:#1748A8;';
    }
    document.getElementById('oi-nm').value='';
    document.getElementById('oi-mt').value='1';
    document.getElementById('oi-search').value='';
    document.getElementById('oi-newcat-row').style.display='none';
    document.getElementById('oi-newcat').value='';
    selectSec(document.querySelector('#oi-sec-btns button[data-sec="A cargo de Programas"]'));
    updateCatOptions();
    switchTab('add');
    ov.style.display='flex';
    setTimeout(function(){document.getElementById('oi-nm').focus();},100);
  }
  window.closeForm = function(){ov.style.display='none';};

  btn.onclick = openForm;
  document.getElementById('oi-cancel').onclick = closeForm;
  ov.onclick = function(ev){if(ev.target===ov)closeForm();};

  document.getElementById('oi-save').onclick = function(){
    var input = document.getElementById('oi-nm');
    var name = input.value.trim();
    if(!name){input.style.borderColor='#ef4444';input.focus();return;}
    input.style.borderColor='#e5e7eb';
    var newCatInput = document.getElementById('oi-newcat').value.trim();
    var cat = newCatInput || document.getElementById('oi-ct').value || 'Materiales Generales';
    var meta = parseInt(document.getElementById('oi-mt').value)||1;
    var isHost = window.OI_MODE==='host';
    var newMat = {
      id: 'm_'+Math.random().toString(36).slice(2,8),
      cat: cat,
      name: name,
      meta: meta
    };
    // Volunteer: tag with current zone
    if(!isHost && window.__oi_state.zone) newMat.zone = window.__oi_state.zone;
    if(newCatInput) window.OI_CUSTOM_SECS[cat.toUpperCase()] = window._selSec;
    else window.OI_CUSTOM_SECS[cat.toUpperCase()] = window._selSec;
    var ns = Object.assign({},window.__oi_state,{matDefs:[...window.__oi_state.matDefs,newMat]});
    window.__oi_setState(ns);
    closeForm();
  };

  document.getElementById('oi-edit-save').onclick = function(){
    var id = document.getElementById('oi-edit-id').value;
    var name = document.getElementById('oi-edit-name').value.trim();
    var cat = document.getElementById('oi-edit-cat').value;
    var meta = parseInt(document.getElementById('oi-edit-meta').value)||0;
    if(!name) return;
    var ns = Object.assign({},window.__oi_state,{
      matDefs: window.__oi_state.matDefs.map(function(m){
        return m.id===id?Object.assign({},m,{name:name,cat:cat,meta:meta}):m;
      })
    });
    window.__oi_setState(ns);
    document.getElementById('oi-edit-ov').style.display='none';
  };
  editOv.onclick = function(ev){if(ev.target===editOv)editOv.style.display='none';};

  applyMode();
},1500);
</script>
